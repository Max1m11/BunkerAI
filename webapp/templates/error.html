{% extends "base.html" %}

{% block content %}
<div class="grid">
    <section class="card error-card">
        <div class="section-caption">{{ ui.error_eyebrow }}</div>
        <div class="empty-state empty-state--static">
            <div class="empty-title">{{ ui.not_found_title }}</div>
            <div class="empty-copy">{{ message }}</div>
            <div class="empty-copy empty-copy--muted">{{ ui.not_found_action }}</div>
        </div>
    </section>
</div>
{% endblock %}
